{% extends 'base.html' %}
{% block content %}
<div class="login-wrap d-flex align-items-center justify-content-center">
  <div class="card shadow-lg login-card border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="brand-circle mx-auto mb-3"><i class="bi bi-cup-hot-fill"></i></div>
        <h3 class="fw-bold mb-1">PERUVIAM</h3>
        <p class="text-muted small mb-0">Quality Management System</p>
      </div>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Usuario o correo</label>
          <input class="form-control" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button class="btn btn-pqms w-100 py-2">Iniciar sesión</button>
      </form>
      <hr>
      <p class="small text-muted mb-1"><b>Cuentas demo:</b></p>
      <ul class="small text-muted mb-0">
        <li>admin / admin123</li>
        <li>supervisor / super123</li>
        <li>operario / oper123</li>
      </ul>
    </div>
  </div>
</div>
{% endblock %}
