{% extends 'base.html' %}
{% block content %}
<h2 class="mb-3">Nuevo lote de producción</h2>
<div class="card border-0 shadow-sm"><div class="card-body">
<form method="post" enctype="multipart/form-data" class="row g-3">
  <div class="col-md-4"><label class="form-label">Código de lote</label>
    <input class="form-control" name="code" required placeholder="L-001"></div>
  <div class="col-md-4"><label class="form-label">Fecha</label>
    <input type="date" class="form-control" name="date" value="{{today}}" required></div>
  <div class="col-md-4"><label class="form-label">Tipo de cerveza</label>
    <select class="form-select" name="beer_type" required>
      {% for t in beer_types %}<option>{{t}}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">% de Alcohol</label>
    <input type="number" step="0.01" min="0" max="20" class="form-control" name="alcohol_pct" required></div>
  <div class="col-md-4"><label class="form-label">Estado</label>
    <select class="form-select" name="status">{% for s in statuses %}<option>{{s}}</option>{% endfor %}</select></div>
  <div class="col-md-4"><label class="form-label">Evidencias (imágenes / PDF)</label>
    <input type="file" class="form-control" name="evidences" multiple></div>
  <div class="col-12"><label class="form-label">Notas / observaciones</label>
    <textarea class="form-control" name="notes" rows="3"></textarea></div>
  <div class="col-12">
    <button class="btn btn-pqms"><i class="bi bi-save"></i> Registrar lote</button>
    <a href="{{ url_for('production.list_batches') }}" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>
</div></div>
{% endblock %}
